AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Datadog Saved View Links - Redirector Lambda

Parameters:
  DatadogApiKey:
    Type: String
    Description: Datadog API Key
    NoEcho: true
  DatadogAppKey:
    Type: String
    Description: Datadog Application Key
    NoEcho: true
  DatadogSite:
    Type: String
    Description: Datadog Site (e.g., datadoghq.com, datadoghq.eu)

Globals:
  Function:
    Runtime: python3.12
    Timeout: 10
    MemorySize: 128
    Architectures:
      - arm64

Resources:
  RedirectHandler:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handler.lambda_handler
      Environment:
        Variables:
          DATADOG_API_KEY: !Ref DatadogApiKey
          DATADOG_APP_KEY: !Ref DatadogAppKey
          DATADOG_SITE: !Ref DatadogSite
      Events:
        Api:
          Type: Api
          Properties:
            Path: /dashboard/{dashboard_id}
            Method: get

Outputs:
  ApiUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/dashboard/"